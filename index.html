<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>MSC Service Center India Private Limited - Aptitude Assessment Portal</title>
<style>
  :root{
    --navy:#1E2A52;
    --navy-dark:#141C39;
    --slate-bg:#F3F5F9;
    --card:#FFFFFF;
    --line:#E1E5EF;
    --text:#1E2536;
    --muted:#5C6478;
    --teal:#178A6E;
    --teal-dark:#116E58;
    --amber:#C7871B;
    --red:#C0392B;
    --radius:10px;
  }
  *{box-sizing:border-box;}
  body{
    margin:0; font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",Roboto,Helvetica,Arial,sans-serif;
    background:var(--slate-bg); color:var(--text); min-height:100vh;
  }
  .topbar{
    background:var(--navy); color:#fff; padding:10px 24px; display:flex; align-items:center; justify-content:space-between; gap:12px;
  }
  .topbar .brand{display:flex; align-items:center; gap:12px; font-weight:700; letter-spacing:.3px; font-size:15px;}
  .topbar .brand img{height:38px; width:auto; background:#fff; border-radius:4px; padding:3px;}
  .topbar .brand .brand-text{line-height:1.3;}
  .topbar .brand .brand-text small{display:block; font-weight:500; font-size:11px; opacity:.75; letter-spacing:.4px;}
  .wrap{max-width:880px; margin:0 auto; padding:32px 20px 60px;}
  .footer-credit{position:fixed; left:14px; bottom:10px; font-size:11.5px; color:var(--muted); opacity:.8; z-index:40; pointer-events:none;}
  .card{background:var(--card); border:1px solid var(--line); border-radius:var(--radius); padding:28px; box-shadow:0 1px 3px rgba(20,28,57,.06);}
  h1{font-size:22px; margin:0 0 6px;}
  h2{font-size:18px; margin:0 0 16px;}
  p.sub{color:var(--muted); margin:0 0 24px; font-size:14px;}
  label{display:block; font-size:13px; font-weight:600; margin-bottom:6px; color:var(--navy);}
  input[type=text], input[type=email], input[type=tel], input[type=date], select, textarea{
    width:100%; padding:10px 12px; border:1px solid var(--line); border-radius:8px; font-size:14px; background:#fff; color:var(--text);
  }
  textarea{font-family:monospace; font-size:12.5px;}
  .field{margin-bottom:16px;}
  .grid2{display:grid; grid-template-columns:1fr 1fr; gap:16px;}
  @media(max-width:600px){.grid2{grid-template-columns:1fr;}}
  .btn{
    display:inline-flex; align-items:center; justify-content:center; gap:6px;
    background:var(--teal); color:#fff; border:none; padding:11px 22px; border-radius:8px;
    font-size:14px; font-weight:600; cursor:pointer;
  }
  .btn:hover{background:var(--teal-dark);}
  .btn.secondary{background:#fff; color:var(--navy); border:1px solid var(--line);}
  .btn.secondary:hover{background:#F5F6FA;}
  .btn.danger{background:var(--red);}
  .btn:disabled{opacity:.5; cursor:not-allowed;}
  .btn-row{display:flex; gap:10px; margin-top:22px; flex-wrap:wrap;}
  .checkbox-row{display:flex; align-items:flex-start; gap:8px; font-size:13px; color:var(--muted); margin:18px 0;}
  .checkbox-row input{margin-top:3px;}
  .role-choice{display:grid; grid-template-columns:1fr 1fr; gap:16px; margin-top:20px;}
  @media(max-width:600px){.role-choice{grid-template-columns:1fr;}}
  .role-card{border:1px solid var(--line); border-radius:var(--radius); padding:22px; cursor:pointer; text-align:left; background:#fff;}
  .role-card:hover{border-color:var(--teal);}
  .role-card h3{margin:0 0 4px; font-size:15px; color:var(--navy);}
  .role-card p{margin:0; font-size:13px; color:var(--muted);}

  /* quiz */
  .quiz-header{position:sticky; top:0; background:var(--navy); color:#fff; padding:12px 20px; display:flex; align-items:center; justify-content:space-between; border-radius:var(--radius) var(--radius) 0 0; z-index:5;}
  .timer{font-size:20px; font-weight:700; letter-spacing:.5px; font-variant-numeric:tabular-nums;}
  .timer.low{color:#FFB4A8;}
  .quiz-body{padding:26px 28px; border:1px solid var(--line); border-top:none; border-radius:0 0 var(--radius) var(--radius); background:#fff;}
  .q-count{font-size:12px; color:var(--muted); margin-bottom:8px; text-transform:uppercase; letter-spacing:.5px;}
  .q-text{font-size:17px; font-weight:600; margin-bottom:20px; line-height:1.5;}
  .q-image{max-width:100%; max-height:320px; border-radius:8px; border:1px solid var(--line); display:block; margin-bottom:18px; object-fit:contain;}
  .thumb{width:44px; height:32px; object-fit:cover; border-radius:4px; border:1px solid var(--line); vertical-align:middle;}
  .img-upload-row{display:flex; align-items:center; gap:12px; flex-wrap:wrap;}
  .img-preview{max-width:160px; max-height:100px; border-radius:6px; border:1px solid var(--line); object-fit:contain;}
  .option{
    display:flex; align-items:center; gap:10px; border:1px solid var(--line); border-radius:8px; padding:12px 14px; margin-bottom:10px; cursor:pointer;
  }
  .option:hover{border-color:var(--teal);}
  .option.selected{border-color:var(--teal); background:#F0FAF7;}
  .option input{accent-color:var(--teal);}
  .palette{display:flex; flex-wrap:wrap; gap:6px; margin:20px 0;}
  .p-btn{width:34px; height:34px; border-radius:6px; border:1px solid var(--line); background:#fff; font-size:12px; cursor:pointer; color:var(--muted);}
  .p-btn.answered{background:var(--teal); color:#fff; border-color:var(--teal);}
  .p-btn.current{outline:2px solid var(--navy); outline-offset:1px;}
  .overlay{position:fixed; inset:0; background:rgba(20,28,57,.85); display:flex; align-items:center; justify-content:center; z-index:50;}
  .overlay .box{background:#fff; border-radius:var(--radius); padding:28px 30px; max-width:420px; text-align:center;}
  .overlay .box h2{color:var(--red);}
  .banner{background:#FFF6E9; border:1px solid #F0D8A8; color:#7A5B12; padding:10px 14px; border-radius:8px; font-size:13px; margin-bottom:16px;}

  table{width:100%; border-collapse:collapse; font-size:13px;}
  th,td{text-align:left; padding:9px 10px; border-bottom:1px solid var(--line);}
  th{color:var(--muted); font-weight:600; font-size:11.5px; text-transform:uppercase; letter-spacing:.4px;}
  tr:hover td{background:#FAFBFD;}
  .tabs{display:flex; gap:4px; margin-bottom:20px; border-bottom:1px solid var(--line);}
  .tab{padding:10px 16px; font-size:13px; font-weight:600; cursor:pointer; color:var(--muted); border-bottom:2px solid transparent;}
  .tab.active{color:var(--navy); border-color:var(--teal);}
  .pill{display:inline-block; padding:2px 9px; border-radius:20px; font-size:11px; font-weight:600;}
  .pill.ok{background:#E4F6EF; color:var(--teal-dark);}
  .pill.bad{background:#FBE9E7; color:var(--red);}
  .note{font-size:12px; color:var(--muted); margin-top:6px;}
  .qa-row{display:grid; grid-template-columns:24px 1fr; gap:8px; margin-bottom:10px; align-items:start;}
  .link-btn{background:none;border:none;color:var(--teal-dark);font-weight:600;font-size:13px;cursor:pointer;padding:0;}
  body.locked-down{-webkit-user-select:none; user-select:none;}
  .watermark-overlay{position:fixed; inset:0; pointer-events:none; z-index:3; overflow:hidden; opacity:.09;}
  .watermark-overlay .wm-row{white-space:nowrap; font-size:13px; font-weight:700; color:#000; transform:rotate(-28deg); position:absolute; left:-20%; width:140%; text-align:center;}
</style>
</head>

const GITHUB_API = `https://api.github.com/repos/${GITHUB_OWNER}/${GITHUB_REPO}/issues`;
const GITHUB_CONFIGURED = !GITHUB_TOKEN.startsWith('YOUR_');

async function ghCreateResultIssue(result){
  const res = await fetch(GITHUB_API, {
    method:'POST',
    headers:{ 'Authorization':'Bearer '+GITHUB_TOKEN, 'Accept':'application/vnd.github+json', 'Content-Type':'application/json' },
    body: JSON.stringify({
      title: `Result: ${result.name} — ${result.examDate}`,
      body: JSON.stringify(result),
      labels: ['apt-result']
    })
  });
  if(!res.ok) throw new Error('GitHub create issue failed: '+res.status);
  return res.json();
}
async function ghListResultIssues(){
  const res = await fetch(GITHUB_API+'?labels=apt-result&state=open&per_page=100', {
    headers:{ 'Authorization':'Bearer '+GITHUB_TOKEN, 'Accept':'application/vnd.github+json' }
  });
  if(!res.ok) throw new Error('GitHub list issues failed: '+res.status);
  const issues = await res.json();
  return issues.map(iss=>{
    let parsed = {};
    try{ parsed = JSON.parse(iss.body); }catch(e){}
    return {...parsed, _issueNumber: iss.number};
  });
}
async function ghCloseIssue(issueNumber){
  const res = await fetch(GITHUB_API+'/'+issueNumber, {
    method:'PATCH',
    headers:{ 'Authorization':'Bearer '+GITHUB_TOKEN, 'Accept':'application/vnd.github+json', 'Content-Type':'application/json' },
    body: JSON.stringify({ state:'closed' })
  });
  if(!res.ok) throw new Error('GitHub close issue failed: '+res.status);
}

/* ---------- QUIZ ---------- */
function startTest(){
  state.questions = loadQuestions();
  state.answers = {};
  state.currentQ = 0;
  state.timeLeft = 900;
  state.violations = 0;
  state.testStarted = true;
  state.screen = 'quiz';
  render();
  requestFullscreenSafe();
  attachAntiNavListeners();
  state.timerId = setInterval(tick, 1000);
}

function requestFullscreenSafe(){
  const el = document.documentElement;
  const req = el.requestFullscreen || el.webkitRequestFullscreen || el.msRequestFullscreen;
  if(req){ req.call(el).catch(()=>{}); }
}
function exitFullscreenSafe(){
  if(document.fullscreenElement){
    (document.exitFullscreen || document.webkitExitFullscreen || function(){}).call(document).catch(()=>{});
  }
}

function tick(){
  state.timeLeft--;
  updateTimerDisplay();
  if(state.timeLeft<=0){ submitTest(true, 'Time expired'); }
}
function updateTimerDisplay(){
  const t = document.getElementById('timerDisplay');
  if(!t) return;
  const m = Math.floor(state.timeLeft/60), s = state.timeLeft%60;
  t.textContent = `${String(m).padStart(2,'0')}:${String(s).padStart(2,'0')}`;
  t.classList.toggle('low', state.timeLeft<=60);
}

function handleViolation(reason){
  if(!state.testStarted) return;
  state.violations++;
  if(state.violations>=3){
    submitTest(true, 'Auto-submitted: repeated navigation violations ('+reason+')');
  } else {
    showViolationOverlay(reason);
  }
}
function showViolationOverlay(reason){
  const ov = document.createElement('div');
  ov.className='overlay'; ov.id='violationOverlay';
  ov.innerHTML = `<div class="box">
    <h2>⚠ Warning ${state.violations}/3</h2>
    <p style="color:var(--muted); font-size:14px;">Leaving the test window is not allowed (${reason}). After 3 warnings your test will be automatically submitted.</p>
    <button class="btn" id="ovOk">Return to Test</button>
  </div>`;
  document.body.appendChild(ov);
  document.getElementById('ovOk').onclick = ()=>{ ov.remove(); requestFullscreenSafe(); };
}

function onVisibilityChange(){ if(document.hidden) handleViolation('tab switched / window minimized'); }
function onWindowBlur(){ handleViolation('window lost focus'); }
function onFullscreenChange(){ if(!document.fullscreenElement && state.testStarted) handleViolation('exited fullscreen'); }
function onContextMenu(e){ if(state.testStarted) e.preventDefault(); }
function onBeforeUnload(e){ if(state.testStarted){ e.preventDefault(); e.returnValue=''; } }
function onKeyDown(e){
  if(!state.testStarted) return;
  const k = e.key ? e.key.toLowerCase() : '';
  const blockCombo = (e.ctrlKey||e.metaKey) && ['c','x','p','s','u'].includes(k);
  const blockKey = ['printscreen','f11','f12'].includes(k) || (e.altKey && k==='tab');
  if(blockCombo || blockKey) e.preventDefault();
}
function onPopState(){ if(state.testStarted){ history.pushState({lock:true}, '', window.location.href); } }
function trapBackButton(){ history.pushState({lock:true}, '', window.location.href); }

function showWatermark(){
  removeWatermark();
  const label = `${state.candidate.name||'Candidate'} · ${state.candidate.candidateId||''} · ${new Date().toLocaleString()}`;
  const wrap = document.createElement('div');
  wrap.className='watermark-overlay'; wrap.id='watermarkOverlay';
  let rows='';
  for(let i=0;i<14;i++){ rows += `<div class="wm-row" style="top:${i*80}px;">${escapeHtml(label)} &nbsp;&nbsp; ${escapeHtml(label)} &nbsp;&nbsp; ${escapeHtml(label)}</div>`; }
  wrap.innerHTML = rows;
  document.body.appendChild(wrap);
}
function removeWatermark(){ const w = document.getElementById('watermarkOverlay'); if(w) w.remove(); }

function attachAntiNavListeners(){
  document.addEventListener('visibilitychange', onVisibilityChange);
  window.addEventListener('blur', onWindowBlur);
  document.addEventListener('fullscreenchange', onFullscreenChange);
  document.addEventListener('contextmenu', onContextMenu);
  window.addEventListener('beforeunload', onBeforeUnload);
  document.addEventListener('keydown', onKeyDown, true);
  window.addEventListener('popstate', onPopState);
  trapBackButton();
  document.body.classList.add('locked-down');
  showWatermark();
}
function detachAntiNavListeners(){
  document.removeEventListener('visibilitychange', onVisibilityChange);
  window.removeEventListener('blur', onWindowBlur);
  document.removeEventListener('fullscreenchange', onFullscreenChange);
  document.removeEventListener('contextmenu', onContextMenu);
  window.removeEventListener('beforeunload', onBeforeUnload);
  document.removeEventListener('keydown', onKeyDown, true);
  window.removeEventListener('popstate', onPopState);
  document.body.classList.remove('locked-down');
  removeWatermark();
}

function renderQuiz(){
  const q = state.questions[state.currentQ];
  const paletteBtns = state.questions.map((qq,i)=>`
    <button class="p-btn ${state.answers[qq.id]!==undefined?'answered':''} ${i===state.currentQ?'current':''}" data-idx="${i}">${i+1}</button>
  `).join('');
  app.innerHTML = `
    <div class="quiz-header">
      <div>Question ${state.currentQ+1} of ${state.questions.length}</div>
      <div class="timer" id="timerDisplay">15:00</div>
    </div>
    <div class="quiz-body">
      <div class="q-count">${q.department || ''}</div>
      <div class="q-text">${escapeHtml(q.text)}</div>
      ${q.image ? `<img class="q-image" src="${q.image}" alt="Question image">` : ''}
      <div id="options">
        ${q.options.map((opt,i)=>`
          <label class="option ${state.answers[q.id]===i?'selected':''}">
            <input type="radio" name="opt" value="${i}" ${state.answers[q.id]===i?'checked':''}>
            <span>${escapeHtml(opt)}</span>
          </label>
        `).join('')}
      </div>
      <div class="palette">${paletteBtns}</div>
      <div class="btn-row">
        <button class="btn secondary" id="prevBtn" ${state.currentQ===0?'disabled':''}>Previous</button>
        <button class="btn secondary" id="nextBtn" ${state.currentQ===state.questions.length-1?'disabled':''}>Next</button>
        <button class="btn danger" id="submitBtn" style="margin-left:auto;">Submit Test</button>
      </div>
    </div>`;
  updateTimerDisplay();
  document.querySelectorAll('#options input').forEach(inp=>{
    inp.onchange = ()=>{ state.answers[q.id] = parseInt(inp.value); renderQuiz(); };
  });
  document.querySelectorAll('.p-btn').forEach(b=>{
    b.onclick = ()=>{ state.currentQ = parseInt(b.dataset.idx); renderQuiz(); };
  });
  document.getElementById('prevBtn').onclick = ()=>{ state.currentQ--; renderQuiz(); };
  document.getElementById('nextBtn').onclick = ()=>{ state.currentQ++; renderQuiz(); };
  document.getElementById('submitBtn').onclick = ()=>{
    if(confirm('Submit the test now? You will not be able to change answers after this.')){
      submitTest(false, 'Submitted by candidate');
    }
  };
}

async function submitTest(auto, statusNote){
  clearInterval(state.timerId);
  detachAntiNavListeners();
  exitFullscreenSafe();
  state.testStarted = false;
  markTokenUsed(state.linkToken);

  let score = 0;
  const answerDetails = state.questions.map(q=>{
    const sel = state.answers[q.id];
    const correct = sel===q.correct;
    if(correct) score++;
    return { qId:q.id, questionText:q.text, options:q.options, selected:sel, correctIndex:q.correct, isCorrect:correct };
  });

  const timeTaken = 900 - state.timeLeft;
  const result = {
    id: 'R-'+Date.now(),
    candidateId: state.candidate.candidateId,
    name: state.candidate.name,
    location: state.candidate.location,
    dob: state.candidate.dob,
    examDate: state.candidate.examDate,
    department: state.candidate.department,
    position: state.candidate.position,
    gender: state.candidate.gender,
    email: state.candidate.email,
    phone: state.candidate.phone,
    score, total: state.questions.length,
    timeTakenSec: timeTaken,
    violations: state.violations,
    status: auto ? 'Auto-submitted' : 'Completed',
    statusNote,
    submittedAt: new Date().toISOString(),
    answers: answerDetails
  };

  state.lastResultId = result.id;
  state.screen = 'submitted';
  render(); // let the candidate see "Thank you" immediately, don't make them wait on network

  // Push to GitHub in the background; fall back to local pending queue on any failure
  try{
    if(!GITHUB_CONFIGURED) throw new Error('GitHub not configured yet');
    await ghCreateResultIssue(result);
  }catch(e){
    addPendingResult(result);
  }
}

function renderAdminBulk(c){
  c.innerHTML = `
    <h2>Bulk Upload Questions (CSV)</h2>
    <p class="note">Format per line: <code>Question,OptionA,OptionB,OptionC,OptionD,CorrectLetter(A-D),Category</code>. Use quotes around any field containing a comma. This replaces or appends to your current question bank.</p>
    <div class="field"><textarea id="csvArea" rows="10" placeholder='What is 2+2?,3,4,5,6,B,Numerical'></textarea></div>
    <div class="btn-row">
      <button class="btn" id="parseAppend">Append to Question Bank</button>
      <button class="btn secondary" id="parseReplace">Replace Entire Question Bank</button>
    </div>
    <div id="bulkMsg" class="note"></div>
  `;
  function parseCsv(text){
    const lines = text.split('\n').map(l=>l.trim()).filter(Boolean);
    const out = [];
    for(const line of lines){
      const cells = splitCsvLine(line);
      if(cells.length<6) continue;
      const [q,a,b,cc,d,corr,dept] = cells;
      const idx = {A:0,B:1,C:2,D:3}[corr.trim().toUpperCase()];
      if(idx===undefined) continue;
      out.push({id:'q'+Date.now()+Math.random().toString(16).slice(2), text:q, options:[a,b,cc,d], correct:idx, department:(dept||'').trim()});
    }
    return out;
  }
  function splitCsvLine(line){
    const res=[]; let cur=''; let inQ=false;
    for(let i=0;i<line.length;i++){
      const ch=line[i];
      if(ch==='"'){ inQ=!inQ; continue; }
      if(ch===',' && !inQ){ res.push(cur); cur=''; continue; }
      cur+=ch;
    }
    res.push(cur);
    return res.map(s=>s.trim());
  }
  document.getElementById('parseAppend').onclick = ()=>{
    const parsed = parseCsv(document.getElementById('csvArea').value);
    if(!parsed.length){ document.getElementById('bulkMsg').textContent='No valid rows found.'; return; }
    saveQuestions([...loadQuestions(), ...parsed]);
    document.getElementById('bulkMsg').textContent = `Added ${parsed.length} question(s).`;
  };
  document.getElementById('parseReplace').onclick = ()=>{
    const parsed = parseCsv(document.getElementById('csvArea').value);
    if(!parsed.length){ document.getElementById('bulkMsg').textContent='No valid rows found.'; return; }
    if(confirm('This will replace the entire question bank. Continue?')){
      saveQuestions(parsed);
      document.getElementById('bulkMsg').textContent = `Question bank replaced with ${parsed.length} question(s).`;
    }
  };
}

  if(!GITHUB_CONFIGURED){
    return { remote:[], pending, error:'GitHub is not configured yet (edit GITHUB_OWNER/REPO/TOKEN at the top of the file).' };
  }
  try{
    const remote = await ghListResultIssues();
    return { remote, pending, error:null };
  }catch(e){
    return { remote:[], pending, error:'Could not reach GitHub (' + e.message + '). Showing locally-pending results only.' };
  }

function exportResultsCsv(results){
  results = results || [];
  const header = ['Name','CandidateID','Location','DOB','ExamDate','Department','Position','Gender','Email','Phone','Score','Total','TimeTakenSec','Violations','Status','SubmittedAt'];
  const rows = results.map(r=>[r.name,r.candidateId,r.location,r.dob,r.examDate,r.department,r.position,r.gender,r.email,r.phone,r.score,r.total,r.timeTakenSec,r.violations,r.status,r.submittedAt]);
  const csv = [header, ...rows].map(row=>row.map(csvEscape).join(',')).join('\n');
  const blob = new Blob([csv], {type:'text/csv'});
  const url = URL.createObjectURL(blob);
  const a = document.createElement('a');
  a.href = url; a.download = 'aptitude_results.csv';
  document.body.appendChild(a); a.click(); a.remove();
  URL.revokeObjectURL(url);
}
function csvEscape(v){
  const s = String(v===undefined?'':v);
  return /[",\n]/.test(s) ? '"'+s.replace(/"/g,'""')+'"' : s;
}

/* ---------- helpers ---------- */
function escapeHtml(str){
  return String(str==null?'':str).replace(/[&<>"']/g, s=>({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[s]));
}

/* ---------- CANDIDATE LINK HANDLING (expiry + one-time use) ---------- */
const LS_USED_TOKENS = 'apt_used_tokens_v1';
function getUsedTokens(){ try{ return JSON.parse(localStorage.getItem(LS_USED_TOKENS))||[]; }catch(e){ return []; } }
function markTokenUsed(tok){
  if(!tok) return;
  const used = getUsedTokens();
  if(!used.includes(tok)){ used.push(tok); localStorage.setItem(LS_USED_TOKENS, JSON.stringify(used)); }
}
function bootstrapFromUrl(){
  const params = new URLSearchParams(window.location.search);
  const mode = params.get('mode');
  const exp = params.get('exp');
  const tok = params.get('tok');
  if(mode==='candidate'){ state.candidateOnlyMode = true; }
  if(tok){ state.linkToken = tok; }
  if(exp){
    const expMs = parseInt(exp,10) * 1000;
    if(!isNaN(expMs) && Date.now() > expMs){ state.screen = 'linkExpired'; return; }
  }
  if(tok && getUsedTokens().includes(tok)){ state.screen = 'linkUsed'; return; }
  if(mode==='candidate'){ state.screen = 'candidateForm'; }
}
bootstrapFromUrl();

render();
